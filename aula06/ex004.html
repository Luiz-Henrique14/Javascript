<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>letras do nome</title>
</head>
<style>
    body{
    background-color: skyblue;
    }
</style>
<body>
    

    <script>
        var nome = window.prompt('Qual é os seu nome')
        document.write(`Seu nome tem ${nome.length} letras`)
        document.writeln(`O nome <strong>${nome}</strong>  todo em Maiúsculo fica <strong>${nome.toUpperCase()}</strong> <br>`)
        document.writeln(`O nome <strong>${nome}</strong> em minúsculo fica <strong>${nome.toLowerCase()}</strong>`)

        /* mostrando em reais as outras casinhas
        > n1
        1545.5
        >n1.toFixed(2)
        '1545.50'
        >n1.toFixed(2).replace('.',',')]

        >n1.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})
        'R$ 1,545.50'
        */
    </script>
</body>
</html>
