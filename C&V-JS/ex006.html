<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vendo como as funções funcionam</title>
    <style>
        div#area {
            font: normal 30pt arial;
            background-color: green;
            color:black;
            width: 500px;
            height: 500px;
            line-height: 500px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="area">
        Interaja...
    </div>
    
    <script>
        var a = window.document.getElementById('area')
        a.addEventListener('click', clicar)
        a.addEventListener('mouseenter', entrar)
        a.addEventListener('mouseout', sair)

        function clicar(){
            
            a.innerText = 'Clicou!'
            a.style.backgroundColor = 'red'
            a.style.color = 'white'
        }
        function entrar(){
            a.innerText = 'Entrou!!'
        }
        function sair(){
            a.innerText = 'Saiu!!!'
            a.style.backgroundColor = 'green'
            a.style.color = 'black'
        }
    </script>
</body>
</html>
