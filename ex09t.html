<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mostrar a nacionalidade</title>
    <style>
        body{
        background-color: skyblue;
        }
    </style>
</head>
<body>
    <h1>
        De qual país você é?
    </h1>
    <input type="text" name="txtn" id="txtn">
    <input type="button" value="verificar" onclick="clicou()">
    <div id="res" >
        
    </div>

    <script>
        var r = document.querySelector('div#res')
        var na = document.querySelector('input#txtn')
        function clicou(){
            
            if (na.value.toLowerCase() == "brasil"){
            r.innerHTML = `vc é brasileiro, vc é do <strong>${na.value}</strong>`
        } else {
            r.innerHTML = 'vc é estrangeira'
        }
    
    }
    </script>

</body>
</html>
