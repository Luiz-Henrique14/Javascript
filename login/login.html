<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Cadastro</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- TELA LOGIN -->
    <div id="loginScreen" class="container">
        <h1>🔐 Login</h1>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Digite seu email" required>
            <button type="submit">Entrar</button>
        </form>
        <a href="#" class="link" onclick="showRegister()">Não tem conta? Cadastre-se</a>
    </div>

    <!-- TELA CADASTRO -->
    <div id="registerScreen" class="container hidden">
        <h1>📝 Cadastro</h1>
        <form id="registerForm">
            <input type="text" id="nome" placeholder="Nome completo" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="number" id="idade" placeholder="Idade" min="1" max="120" required>
            <button type="submit">Cadastrar</button>
        </form>
        <a href="#" class="link" onclick="showLogin()">Já tem conta? Login</a>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardScreen" class="dashboard hidden">
        <h1>🎉 Seja bem-vindo!</h1>
        <div id="userInfo" class="info"></div>
        <button onclick="logout()">Sair</button>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
